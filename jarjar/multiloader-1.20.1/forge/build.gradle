// Forge loader module. Shared FG7 config + common-source-merge + run tasks come from the root build.gradle.
plugins {
    id 'net.minecraftforge.renamer'
}

dependencies {
    implementation minecraft.dependency("net.minecraftforge:forge:${mc_version}-${forge_version}")
}

// renamer-gradle 1.1.1 defaults to renamer tool 2.2.1, which isn't published; pin a version that is.
renamerTools {
    configure("classes") { artifact = "net.minecraftforge:renamer:2.2.3:all" }
}

// Production reobf: Mojmap (dev) -> SRG (shipped). Forge 47.x (MC 1.20.1) runs SRG names in production.
//
// We reobf the `jarJar` task output (not the base `jar`) so the shipped jar has BOTH reobfed mod classes AND
// the nested greetlib library. greetlib has no Minecraft references, so the renaper leaves it untouched — it
// only remaps the mod's .class files; the nested jar is a binary entry that passes through unchanged.
renamer.classes(tasks.named('jarJar', Jar)) {
    map.from minecraft.dependency.toSrgFile
    archiveClassifier = 'srg'
}
