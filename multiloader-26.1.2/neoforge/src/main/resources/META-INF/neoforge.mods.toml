    type = "required"
    versionRange = "[0,)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "minecraft"
    type = "required"
    versionRange = "${mc_version_range}"
    ordering = "NONE"
    side = "BOTH"
